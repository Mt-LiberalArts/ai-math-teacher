<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学の先生</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<style>
  :root {
    --bg:        #0f0f0f;
    --surface:   #181818;
    --border:    #2a2a2a;
    --accent:    #c9a84c;
    --accent2:   #7eb8c9;
    --text:      #e8e4dc;
    --muted:     #6b6760;
    --user-bg:   #1e1e1e;
    --ai-bg:     #141414;
    --radius:    10px;
    --font-body: 'Noto Serif JP', serif;
    --font-mono: 'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.75;
  }

  /* ── Gate Screen ── */
  #gate-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }

  #gate-screen.hidden { display: none; }

  .gate-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  .gate-icon {
    font-size: 2.8rem;
    margin-bottom: 16px;
  }

  .gate-box h1 {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .gate-box p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.8;
  }

  /* ── Step indicator ── */
  .step-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 28px;
  }

  .step-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s, transform 0.3s;
  }

  .step-dot.active {
    background: var(--accent);
    transform: scale(1.3);
  }

  .step-dot.done {
    background: #4caf50;
  }

  .step-line {
    width: 32px;
    height: 1px;
    background: var(--border);
    transition: background 0.3s;
  }

  .step-line.done {
    background: #4caf50;
  }

  /* ── Step panels ── */
  .step-panel {
    display: none;
  }

  .step-panel.active {
    display: block;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .gate-field {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
  }

  .gate-field input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
    letter-spacing: 0.05em;
  }

  .gate-field input:focus { border-color: var(--accent); }
  .gate-field input.valid { border-color: #4caf50; }
  .gate-field input.error { border-color: #e57373; }

  .gate-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-bottom: 12px;
  }

  .gate-btn:hover { opacity: 0.85; }
  .gate-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .gate-back {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 0.8rem;
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s;
    display: block;
    margin: 0 auto 4px;
  }

  .gate-back:hover { color: var(--text); }

  .gate-error {
    font-size: 0.8rem;
    color: #e57373;
    min-height: 20px;
    margin-top: 4px;
  }

  .gate-hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 24px;
  }

  .gate-hint a {
    color: var(--accent2);
    text-decoration: none;
  }

  /* 成功バッジ */
  .success-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #1a2e1a;
    border: 1px solid #4caf50;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.78rem;
    color: #81c784;
    margin-bottom: 20px;
  }

  /* ── App Layout ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 800px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--accent);
  }

  header h1 span {
    color: var(--muted);
    font-weight: 400;
    font-size: 0.85rem;
    margin-left: 8px;
  }

  #api-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #api-key-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    padding: 5px 10px;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  #api-key-input:focus { border-color: var(--accent); }
  #api-key-input.saved { border-color: #4caf50; }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 14px;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .avatar { background: #2a2a1e; border: 1px solid var(--accent); color: var(--accent); }
  .msg.ai   .avatar { background: #1a2028; border: 1px solid var(--accent2); color: var(--accent2); }

  .bubble {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    min-width: 0;
  }

  .msg.user .bubble { background: var(--user-bg); }
  .msg.ai   .bubble { background: var(--ai-bg); }

  .bubble p { margin-bottom: 0.6em; }
  .bubble p:last-child { margin-bottom: 0; }
  .katex-display { margin: 0.8em 0; overflow-x: auto; }

  .bubble code {
    font-family: var(--font-mono);
    font-size: 0.85em;
    background: #222;
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent2);
  }

  .bubble pre {
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    overflow-x: auto;
    font-family: var(--font-mono);
    font-size: 0.82em;
    margin: 0.6em 0;
  }

  .bubble img {
    max-width: 100%;
    max-height: 260px;
    border-radius: 6px;
    border: 1px solid var(--border);
    margin-bottom: 8px;
    display: block;
  }

  .typing span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    margin: 0 2px;
    animation: blink 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* ── Input area ── */
  #input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  #preview-bar {
    display: none;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
  }

  #preview-bar.active { display: flex; }
  #preview-thumb { height: 44px; border-radius: 4px; }
  #preview-name { font-size: 0.8rem; color: var(--muted); flex: 1; }

  #remove-image {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1.1rem; padding: 0 4px;
  }

  #remove-image:hover { color: #e57373; }

  #input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #image-btn {
    width: 38px; height: 38px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s;
  }

  #image-btn:hover { border-color: var(--accent); color: var(--accent); }
  #image-btn.has-image { border-color: var(--accent2); color: var(--accent2); }

  #user-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.95rem;
    padding: 9px 14px;
    resize: none;
    outline: none;
    min-height: 38px;
    max-height: 160px;
    line-height: 1.6;
    transition: border-color 0.2s;
  }

  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 38px; height: 38px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #0f0f0f;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }

  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  #send-btn:not(:disabled):hover { opacity: 0.85; }

  #hint {
    margin-top: 8px;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
  }

  #welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  #welcome .icon { font-size: 2.5rem; margin-bottom: 12px; }
  #welcome h2 { font-size: 1.1rem; color: var(--text); margin-bottom: 8px; }
  #welcome p { font-size: 0.88rem; line-height: 1.8; }
</style>
</head>
<body>

<!-- ── Gate Screen ── -->
<div id="gate-screen">
  <div class="gate-box">
    <div class="gate-icon">∑</div>
    <h1>数学の先生</h1>

    <!-- ステップインジケーター -->
    <div class="step-indicator">
      <div class="step-dot active" id="dot-1"></div>
      <div class="step-line" id="line-1"></div>
      <div class="step-dot" id="dot-2"></div>
    </div>

    <!-- Step 1: ライセンスキー -->
    <div class="step-panel active" id="step-1">
      <p>ライセンスキーを入力してください。</p>
      <div class="gate-field">
        <input type="password" id="license-key-input"
               placeholder="ライセンスキー（Whopで購入）"
               autocomplete="off" spellcheck="false">
      </div>
      <button class="gate-btn" id="license-btn">次へ →</button>
      <div class="gate-error" id="license-error"></div>
      <div class="gate-hint">
        ライセンスキーは <a href="https://whop.com" target="_blank">Whop</a> でご購入ください。
      </div>
    </div>

    <!-- Step 2: Groq APIキー -->
    <div class="step-panel" id="step-2">
      <div class="success-badge">✓ ライセンス認証済み</div>
      <p>Groq APIキーを入力してください。</p>
      <div class="gate-field">
        <input type="password" id="groq-key-input"
               placeholder="Groq APIキー（gsk_...）"
               autocomplete="off" spellcheck="false">
      </div>
      <button class="gate-btn" id="groq-btn">入室する</button>
      <button class="gate-back" id="back-btn">← 戻る</button>
      <div class="gate-error" id="groq-error"></div>
      <div class="gate-hint">
        Groq APIキーは <a href="https://console.groq.com" target="_blank">console.groq.com</a> で無料取得できます。
      </div>
    </div>

  </div>
</div>

<!-- ── Main App ── -->
<div id="app">
  <header>
    <h1>数学の先生 <span>Socratic AI Tutor</span></h1>
    <div id="api-bar">
      <input type="password" id="api-key-input" placeholder="Groq APIキー" autocomplete="off" readonly>
    </div>
  </header>

  <div id="messages">
    <div id="welcome">
      <div class="icon">∑</div>
      <h2>数学の問題を送ってください</h2>
      <p>答えを教えるのではなく、<br>一緒に考えながら解き方を見つけていきます。<br><br>
      画像（📷）で手書きの問題や教科書の写真も送れます。</p>
    </div>
  </div>

  <div id="input-area">
    <div id="preview-bar">
      <img id="preview-thumb" src="" alt="">
      <span id="preview-name"></span>
      <button id="remove-image" title="削除">✕</button>
    </div>
    <div id="input-row">
      <button id="image-btn" title="画像を添付">📷</button>
      <input type="file" id="file-input" accept="image/*" style="display:none">
      <textarea id="user-input" rows="1" placeholder="問題を入力…（Shift+Enterで改行）"></textarea>
      <button id="send-btn">↑</button>
    </div>
    <div id="hint">数式は $x^2$ や $$\int f(x)dx$$ 形式で入力できます</div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────
const history = [];
let pendingImage = null;
let isStreaming  = false;
let licenseKey   = '';

// ── Elements ───────────────────────────────────────────────
const gateScreen    = document.getElementById('gate-screen');
const licenseInput  = document.getElementById('license-key-input');
const groqKeyInput  = document.getElementById('groq-key-input');
const licenseBtnEl  = document.getElementById('license-btn');
const groqBtnEl     = document.getElementById('groq-btn');
const backBtnEl     = document.getElementById('back-btn');
const licenseError  = document.getElementById('license-error');
const groqError     = document.getElementById('groq-error');
const step1El       = document.getElementById('step-1');
const step2El       = document.getElementById('step-2');
const dot1          = document.getElementById('dot-1');
const dot2          = document.getElementById('dot-2');
const line1         = document.getElementById('line-1');
const messagesEl    = document.getElementById('messages');
const welcomeEl     = document.getElementById('welcome');
const inputEl       = document.getElementById('user-input');
const sendBtn       = document.getElementById('send-btn');
const imageBtn      = document.getElementById('image-btn');
const fileInput     = document.getElementById('file-input');
const previewBar    = document.getElementById('preview-bar');
const previewThumb  = document.getElementById('preview-thumb');
const previewName   = document.getElementById('preview-name');
const removeImgBtn  = document.getElementById('remove-image');
const apiKeyDisplay = document.getElementById('api-key-input');

// ── セッション復元 ─────────────────────────────────────────
const savedLicense = sessionStorage.getItem('license_key') || '';
const savedGroq    = sessionStorage.getItem('groq_key') || '';
if (savedLicense && savedGroq) {
  licenseKey = savedLicense;
  apiKeyDisplay.value = savedGroq;
  gateScreen.classList.add('hidden');
}

// ── Step切り替えヘルパー ───────────────────────────────────
function goToStep2() {
  step1El.classList.remove('active');
  step2El.classList.add('active');
  dot1.classList.remove('active');
  dot1.classList.add('done');
  line1.classList.add('done');
  dot2.classList.add('active');
  groqKeyInput.focus();
}

function goToStep1() {
  step2El.classList.remove('active');
  step1El.classList.add('active');
  dot2.classList.remove('active');
  dot1.classList.remove('done');
  dot1.classList.add('active');
  line1.classList.remove('done');
  licenseError.textContent = '';
  licenseInput.focus();
}

// ── Step 1: ライセンスキー検証 ────────────────────────────
licenseBtnEl.addEventListener('click', handleLicense);
licenseInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleLicense(); });

async function handleLicense() {
  const lk = licenseInput.value.trim();
  licenseError.textContent = '';

  if (!lk) { licenseError.textContent = 'ライセンスキーを入力してください'; return; }

  licenseBtnEl.disabled = true;
  licenseBtnEl.textContent = '確認中…';

  try {
    const res = await fetch('/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ license_key: lk }),
    });
    const data = await res.json();

    if (data.valid) {
      licenseKey = lk;
      sessionStorage.setItem('license_key', lk);
      licenseInput.classList.remove('error');
      licenseInput.classList.add('valid');
      goToStep2();
    } else {
      licenseError.textContent = 'ライセンスキーが無効です。Whopでご購入ください。';
      licenseInput.classList.add('error');
    }
  } catch (e) {
    licenseError.textContent = 'サーバーエラーが発生しました。しばらく待ってから再試行してください。';
  } finally {
    licenseBtnEl.disabled = false;
    licenseBtnEl.textContent = '次へ →';
  }
}

// ── Step 2: Groq APIキー入力 ──────────────────────────────
groqBtnEl.addEventListener('click', handleGroq);
groqKeyInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleGroq(); });
backBtnEl.addEventListener('click', goToStep1);

function handleGroq() {
  const gk = groqKeyInput.value.trim();
  groqError.textContent = '';

  if (!gk) { groqError.textContent = 'Groq APIキーを入力してください'; return; }
  if (!gk.startsWith('gsk_')) {
    groqError.textContent = 'Groq APIキーが正しくありません（gsk_ で始まる必要があります）';
    groqKeyInput.classList.add('error');
    return;
  }

  sessionStorage.setItem('groq_key', gk);
  apiKeyDisplay.value = gk;
  groqKeyInput.classList.add('valid');
  gateScreen.classList.add('hidden');
}

// ── KaTeX ─────────────────────────────────────────────────
function renderKatex(el) {
  if (typeof renderMathInElement === 'undefined') return;
  renderMathInElement(el, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '$',  right: '$',  display: false},
    ],
    throwOnError: false,
  });
}

// ── テキスト → HTML ────────────────────────────────────────
function textToHtml(text) {
  text = text.replace(/```([\s\S]*?)```/g, (_, code) =>
    `<pre><code>${escHtml(code.trim())}</code></pre>`);
  text = text.replace(/`([^`]+)`/g, (_, code) =>
    `<code>${escHtml(code)}</code>`);
  text = text.replace(/\n/g, '<br>');
  return text;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── メッセージ追加 ─────────────────────────────────────────
function addMessage(role, content, imageDataUrl = null) {
  if (welcomeEl) welcomeEl.remove();

  const msg    = document.createElement('div');
  msg.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '👤' : '∑';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (imageDataUrl) {
    const img = document.createElement('img');
    img.src = imageDataUrl;
    bubble.appendChild(img);
  }

  const textDiv = document.createElement('div');
  textDiv.className = 'text-content';
  textDiv.innerHTML = textToHtml(content);
  bubble.appendChild(textDiv);

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  messagesEl.appendChild(msg);
  scrollBottom();

  renderKatex(bubble);
  return { bubble, textDiv };
}

// ── ローディング ───────────────────────────────────────────
function addTyping() {
  if (welcomeEl) welcomeEl.remove();
  const msg = document.createElement('div');
  msg.className = 'msg ai';
  msg.id = 'typing-indicator';
  msg.innerHTML = `
    <div class="avatar">∑</div>
    <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  messagesEl.appendChild(msg);
  scrollBottom();
}

function removeTyping() {
  document.getElementById('typing-indicator')?.remove();
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── 画像選択 ───────────────────────────────────────────────
imageBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    const base64  = dataUrl.split(',')[1];
    pendingImage  = { base64, media_type: file.type, dataUrl, name: file.name };
    previewThumb.src = dataUrl;
    previewName.textContent = file.name;
    previewBar.classList.add('active');
    imageBtn.classList.add('has-image');
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
});

removeImgBtn.addEventListener('click', () => {
  pendingImage = null;
  previewBar.classList.remove('active');
  imageBtn.classList.remove('has-image');
});

// ── 送信 ───────────────────────────────────────────────────
async function sendMessage() {
  if (isStreaming) return;

  const text   = inputEl.value.trim();
  const apiKey = apiKeyDisplay.value.trim();

  if (!licenseKey) { gateScreen.classList.remove('hidden'); return; }
  if (!apiKey)     { return; }
  if (!text && !pendingImage) return;

  isStreaming = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  autoResize();

  const userContent = text || '（画像を送信しました）';
  addMessage('user', userContent, pendingImage?.dataUrl ?? null);

  const userMsg = { role: 'user', content: userContent };
  if (pendingImage) userMsg.image = { base64: pendingImage.base64, media_type: pendingImage.media_type };
  history.push(userMsg);

  const imgPayload = pendingImage ? { base64: pendingImage.base64, media_type: pendingImage.media_type } : null;
  pendingImage = null;
  previewBar.classList.remove('active');
  imageBtn.classList.remove('has-image');

  addTyping();

  try {
    const body = {
      api_key: apiKey,
      license_key: licenseKey,
      messages: history.map((m, i) => ({
        role: m.role,
        content: m.content,
        ...(i === history.length - 1 && m.image ? { image: m.image } : {}),
      })),
    };

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'サーバーエラー');
    }

    removeTyping();
    const { bubble, textDiv } = addMessage('ai', '');
    let fullText = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const chunk = JSON.parse(data);
          if (chunk.error) throw new Error(chunk.error);
          if (chunk.content) {
            fullText += chunk.content;
            textDiv.innerHTML = textToHtml(fullText);
            renderKatex(bubble);
            scrollBottom();
          }
        } catch (e) {
          if (e.message !== 'Unexpected end of JSON input') throw e;
        }
      }
    }

    history.push({ role: 'assistant', content: fullText });

  } catch (err) {
    removeTyping();
    addMessage('ai', `⚠️ エラー: ${err.message}`);
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// ── テキストエリア自動リサイズ ────────────────────────────
function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
}

inputEl.addEventListener('input', autoResize);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);
</script>
</body>
